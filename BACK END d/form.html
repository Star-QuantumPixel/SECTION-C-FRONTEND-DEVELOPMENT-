<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="index.html">MySite</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link active" href="#">Contact ME</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <h2 class="mb-4">Contact ME</h2>

      <form id="signupForm" novalidate>
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input type="text" class="form-control" id="name" placeholder="Your name">
          <div class="invalid-feedback">Please enter your name.</div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com">
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary">Submit</button>
        <div id="formMessage" class="mt-3" aria-live="polite"></div>
      </form>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      $(function(){
        $('#signupForm').on('submit', function(e){
          e.preventDefault();
          var name = $('#name').val().trim();
          var email = $('#email').val().trim();
          var valid = true;

          if(!name){
            $('#name').addClass('is-invalid');
            valid = false;
          } else {
            $('#name').removeClass('is-invalid');
          }

          if(!email){
            $('#email').addClass('is-invalid');
            valid = false;
          } else {
            // basic email pattern check
            var re = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
            if(!re.test(email)){
              $('#email').addClass('is-invalid');
              valid = false;
            } else {
              $('#email').removeClass('is-invalid');
            }
          }

          if(!valid){
            $('#formMessage').html('<div class="alert alert-danger">Please fix the errors above.</div>');
            return;
          }

          $('#formMessage').html('<div class="alert alert-success">Thank you! Your submission was successful.</div>');
          // Optionally reset form
          // $(this)[0].reset();
        });

        // Remove validation style on input
        $('#name, #email').on('input', function(){
          if($(this).val().trim()) $(this).removeClass('is-invalid');
        });
      });
    </script>
  </body>
</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">MySite</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Interactive Form Section -->
    <section id="contact">
        <div class="form-section">
            <h4 class="mb-3">Contact Us</h4>
            <form id="contactForm" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name">
                    <div class="invalid-feedback">Please enter your name.</div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                    <div class="invalid-feedback">Please enter your email.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Submit</button>
            </form>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        $(function() {
            $('#contactForm').on('submit', function(e) {
                e.preventDefault();
                let valid = true;
                const name = $('#name');
                const email = $('#email');
                if (!name.val().trim()) {
                    name.addClass('is-invalid');
                    valid = false;
                } else {
                    name.removeClass('is-invalid');
                }
                if (!email.val().trim()) {
                    email.addClass('is-invalid');
                    valid = false;
                } else {
                    email.removeClass('is-invalid');
                }
                if (valid) {
                    alert('Form submitted successfully!');
                    this.reset();
                }
            });
        });
    </script>
</body>
</html>
