<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="reg-form">
        <h3 class="mb-4 text-center">Student Registration</h3>
        <form id="studentForm" action="register.php" method="post" novalidate>
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name">
                <div class="invalid-feedback">Please enter your name.</div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email">
                <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            <div class="mb-3">
                <label for="roll" class="form-label">Roll Number</label>
                <input type="text" class="form-control" id="roll" name="roll">
                <div class="invalid-feedback">Please enter your roll number.</div>
            </div>
            <div class="mb-3">
                <label for="course" class="form-label">Course</label>
                <input type="text" class="form-control" id="course" name="course">
                <div class="invalid-feedback">Please enter your course.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(function() {
            $('#studentForm').on('submit', function(e) {
                let valid = true;
                // Name
                const name = $('#name');
                if (!name.val().trim()) {
                    name.addClass('is-invalid');
                    valid = false;
                } else {
                    name.removeClass('is-invalid');
                }
                // Email
                const email = $('#email');
                const emailVal = email.val().trim();
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailVal || !emailPattern.test(emailVal)) {
                    email.addClass('is-invalid');
                    valid = false;
                } else {
                    email.removeClass('is-invalid');
                }
                // Roll
                const roll = $('#roll');
                if (!roll.val().trim()) {
                    roll.addClass('is-invalid');
                    valid = false;
                } else {
                    roll.removeClass('is-invalid');
                }
                // Course
                const course = $('#course');
                if (!course.val().trim()) {
                    course.addClass('is-invalid');
                    valid = false;
                } else {
                    course.removeClass('is-invalid');
                }
                if (!valid) {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
